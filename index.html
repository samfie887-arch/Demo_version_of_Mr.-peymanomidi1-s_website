<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="ژینو - فروشگاه اینترنتی لوکس | خرید آنلاین با طراحی مدرن">
    <meta name="theme-color" content="#0b132b">
    <title>ژینو | فروشگاه اینترنتی لوکس</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b132b;
            --bg-secondary: #141e38;
            --bg-card: rgba(20, 30, 56, 0.96);
            --bg-glass: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: #f0f4ff;
            --text-muted: #cbd5e1;
            --accent: #6fffe9;
            --accent-hover: #4cd4c0;
            --accent-glow: rgba(111, 255, 233, 0.6);
            --gold: #f4d03f;
            --danger: #ff6b6b;
            --border: rgba(255, 255, 255, 0.2);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-full: 50px;
            --navbar-height: 60px;
            --z-nav: 1000;
            --z-dropdown: 1050;
            --z-search: 1100;
            --z-modal: 1200;
            --z-toast: 1300;
        }

        body.light-mode {
            --bg-primary: #f4f6fb;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.96);
            --bg-glass: rgba(0, 0, 0, 0.06);
            --text-primary: #0b132b;
            --text-secondary: #1e293b;
            --text-muted: #475569;
            --accent: #0d9488;
            --accent-hover: #0f766e;
            --accent-glow: rgba(13, 148, 136, 0.5);
            --gold: #b45309;
            --danger: #dc2626;
            --border: rgba(0, 0, 0, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.4s, color 0.4s;
            overflow-x: hidden;
            min-height: 100vh;
        }
        body.no-scroll { overflow: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
        .section-padding { padding: 60px 0; }
        .section-title { text-align: center; margin-bottom: 32px; }
        .section-title h2 {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; display: inline-block;
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px 22px; border-radius: var(--radius-full); font-weight: 600;
            border: none; cursor: pointer; transition: all 0.25s ease;
            font-family: inherit; white-space: nowrap; text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #2dd4bf); color: #0b132b;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .btn-outline {
            border: 2px solid var(--accent); color: var(--accent); background: transparent;
        }

        /* نوبار */
        .navbar {
            position: sticky; top: 0; z-index: var(--z-nav);
            background: rgba(11, 19, 43, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            height: var(--navbar-height);
        }
        body.light-mode .navbar { background: rgba(255, 255, 255, 0.9); }
        .navbar-inner {
            display: flex; align-items: center; justify-content: space-between;
            height: 100%; gap: 12px;
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 8px;
            text-decoration: none; font-size: 1.4rem; font-weight: 800;
        }
        .brand-logo svg { width: 30px; height: 30px; display: block; }
        .brand-text {
            background: linear-gradient(135deg, var(--accent), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        body.light-mode .brand-text {
            background: linear-gradient(135deg, var(--accent), #0b132b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .navbar-actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%; border: none;
            background: var(--bg-glass); color: var(--text-primary); cursor: pointer;
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            position: relative; backdrop-filter: blur(4px);
        }
        .icon-btn:hover { background: rgba(255,255,255,0.25); }
        .badge-count {
            position: absolute; top: -4px; right: -4px; background: var(--danger); color: #fff;
            font-size: 0.65rem; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
            border: 2px solid var(--bg-primary);
        }

        .hamburger {
            display: flex; flex-direction: column; gap: 5px; background: none;
            border: none; cursor: pointer; padding: 8px;
        }
        .hamburger span {
            width: 22px; height: 2px; background: var(--text-primary); border-radius: 2px;
            transition: 0.3s;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

        .mobile-menu {
            position: fixed; top: 0; right: -100%; width: 85%; max-width: 340px; height: 100vh;
            background: rgba(11, 19, 43, 0.98); backdrop-filter: blur(24px); z-index: 1500;
            padding: 80px 24px 30px; transition: right 0.3s; border-left: 1px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        body.light-mode .mobile-menu { background: rgba(255, 255, 255, 0.98); }
        .mobile-menu.active { right: 0; }
        .mobile-menu a {
            display: block; padding: 12px 16px; border-radius: var(--radius-sm);
            color: var(--text-primary); text-decoration: none; margin-bottom: 6px;
            font-weight: 500; background: var(--bg-glass);
        }
        .mobile-menu a:hover { background: rgba(111,255,233,0.25); color: var(--accent); }
        .mobile-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1400;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .mobile-overlay.active { opacity: 1; visibility: visible; }

        /* کشوها */
        .dropdown-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-card); backdrop-filter: blur(24px);
            border-top: 1px solid var(--border); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
            max-height: 70vh; overflow-y: auto; padding: 20px;
            transform: translateY(100%); transition: transform 0.3s ease;
            z-index: var(--z-dropdown);
        }
        .dropdown-panel.active { transform: translateY(0); }
        .dropdown-panel h3 { margin-bottom: 12px; color: var(--accent); font-weight: 700; }
        .dropdown-item { display: flex; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .dropdown-item img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        .item-title { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
        .item-price { font-size: 0.85rem; color: var(--accent); font-weight: 700; }
        .remove-item { background: none; border: none; color: var(--danger); font-size: 1.2rem; cursor: pointer; }
        .dropdown-footer { margin-top: 16px; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-footer .total { font-weight: 700; color: var(--text-primary); }

        /* جستجو */
        .search-overlay {
            position: fixed; inset: 0; background: rgba(11, 19, 43, 0.97);
            z-index: var(--z-search); display: flex; align-items: flex-start; justify-content: center;
            padding-top: 80px; opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .search-overlay.active { opacity: 1; visibility: visible; }
        .search-container { width: 90%; max-width: 500px; }
        .search-input-wrap { display: flex; gap: 8px; }
        .search-input-wrap input {
            flex: 1; padding: 12px 16px; border-radius: 30px; border: 2px solid var(--border);
            background: var(--bg-card); color: var(--text-primary); font-size: 1rem;
            outline: none; font-family: inherit;
        }
        .search-input-wrap input:focus { border-color: var(--accent); }
        .search-results { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
        .search-item {
            background: var(--bg-card); padding: 10px 16px; border-radius: var(--radius-sm);
            cursor: pointer; color: var(--text-primary); border: 1px solid transparent;
        }
        .search-item:hover { border-color: var(--accent); }

        /* کارت محصول */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .product-card {
            background: var(--bg-card); backdrop-filter: blur(12px);
            border-radius: var(--radius-md); overflow: hidden;
            border: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .product-img {
            aspect-ratio: 1/1; background: var(--bg-glass); position: relative;
            overflow: hidden;
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-badges { position: absolute; top: 8px; right: 8px; z-index: 2; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem;
            background: var(--accent); color: #0b132b; font-weight: 700;
        }
        .wishlist-btn-card {
            position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.5);
            width: 30px; height: 30px; border-radius: 50%; border: none;
            color: #fff; font-size: 1rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2;
        }
        .product-info {
            padding: 12px; display: flex; flex-direction: column; flex: 1;
        }
        .product-category { font-size: 0.65rem; color: var(--accent); margin-bottom: 4px; font-weight: 600; }
        .product-name {
            font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; color: var(--text-primary);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .price { font-weight: 800; font-size: 1rem; color: var(--accent); }
        .old-price { font-size: 0.75rem; color: var(--text-muted); text-decoration: line-through; margin-right: 6px; }
        .add-to-cart-btn {
            width: 100%; margin-top: auto; padding: 8px; border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), #2dd4bf);
            color: #0b132b; border: none; font-weight: 700; font-family: inherit;
            cursor: pointer; font-size: 0.8rem;
        }

        /* تایمر */
        .countdown { display: flex; gap: 8px; justify-content: center; margin: 20px 0 24px; }
        .countdown-item {
            background: rgba(20,30,56,0.8); padding: 10px 14px; border-radius: var(--radius-sm);
            min-width: 55px; border: 1px solid var(--border);
            text-align: center;
        }
        .countdown-number { font-size: 1.4rem; font-weight: 800; color: var(--danger); }
        .countdown-label { font-size: 0.7rem; color: var(--text-muted); }

        /* فیلترها */
        .category-filter { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 28px; }
        .filter-btn {
            padding: 8px 16px; border: 2px solid var(--border); background: var(--bg-card);
            color: var(--text-secondary); border-radius: 30px; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--accent); color: #0b132b; border-color: var(--accent);
            font-weight: 700;
        }

        /* فوتر */
        .footer {
            background: var(--bg-card); backdrop-filter: blur(12px);
            border-top: 1px solid var(--border); padding: 40px 0 24px; margin-top: 60px;
            text-align: center; color: var(--text-secondary);
        }
        .footer-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .footer-col h4 { color: var(--accent); margin-bottom: 8px; font-weight: 700; }
        .footer-col ul { list-style: none; }
        .footer-col ul li a { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; }
        .footer-col ul li a:hover { color: var(--accent); }

        /* Toast */
        .toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }

        @media (min-width: 768px) {
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
            .navbar-brand { font-size: 1.6rem; }
            .brand-logo svg { width: 36px; height: 36px; }
            .dropdown-panel {
                position: absolute; bottom: auto; top: calc(var(--navbar-height) - 5px);
                left: 0; right: auto; width: 340px; border-radius: var(--radius-lg);
                transform: translateY(-10px); box-shadow: var(--shadow-card);
            }
            .footer-grid { flex-direction: row; justify-content: space-around; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container navbar-inner">
            <a href="index.html" class="navbar-brand">
                <span class="brand-logo">

        <h3>❤️ علاقه‌مندی‌ها</h3>
        <div id="wishlistItems"></div>
    </div>

    <div class="search-overlay" id="searchOverlay">
        <div class="search-container">
            <div class="search-input-wrap">
                <input type="text" id="searchInput" placeholder="جستجو...">
                <button class="btn btn-outline" id="closeSearch">بستن</button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <main>
        <section style="background: radial-gradient(circle at 30% 20%, #1c2541, #0b132b); padding: 60px 0 40px; text-align: center; position: relative;">
            <div class="container" style="position: relative; z-index:1;">
                <h1 style="font-size: clamp(2rem, 5vw, 3rem); background: linear-gradient(135deg, var(--accent), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">خریدی لوکس، تجربه‌ای ناب</h1>
                <p style="color: #f8fafc; margin: 12px 0 8px; font-weight: 500;">تا ۵۰٪ تخفیف ویژه</p>
                <div class="countdown" id="countdown">
                    <div class="countdown-item"><div class="countdown-number" id="cd-seconds">56</div><div class="countdown-label">ثانیه</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="cd-minutes">34</div><div class="countdown-label">دقیقه</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="cd-hours">02</div><div class="countdown-label">ساعت</div></div>
                </div>

        </section>

        <div class="container" style="padding-top: 24px;">
            <div class="category-filter" id="categoryFilter">
                <button class="filter-btn active" data-category="all">همه</button>
                <button class="filter-btn" data-category="fashion">مد و پوشاک</button>
                <button class="filter-btn" data-category="electronics">الکترونیک</button>
                <button class="filter-btn" data-category="beauty">زیبایی</button>
            </div>
        </div>

        <section class="section-padding" id="flash-sale" style="padding-top: 8px;">
            <div class="container">
                <div class="section-title"><h2>⚡ فروش ویژه</h2></div>
                <div class="products-grid" id="flashProducts"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col"><h4>ژینو</h4><p style="font-size:0.85rem; color:var(--text-secondary);">خریدی لوکس و مطمئن</p></div>
                <div class="footer-col"><h4>خدمات</h4><ul><li><a href="#">پیگیری</a></li><li><a href="#">بازگشت کالا</a></li></ul></div>
                <div class="footer-col"><h4>اطلاعات</h4><ul><li><a href="#">درباره ما</a></li><li><a href="#">تماس</a></li></ul></div>
            </div>
            <div style="font-size:0.8rem; color:var(--text-muted);">© ۱۴۰۴ ژینو</div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const products = [
            { id:1, name:'ساعت مچی لوکس', category:'مد و پوشاک', group:'fashion', subcat:'ساعت', price:2850000, oldPrice:3400000, discount:16, image:'https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=400&h=400&fit=crop' },
            { id:2, name:'کیف چرم طبیعی', category:'مد و پوشاک', group:'fashion', subcat:'کیف', price:1950000, oldPrice:2400000, discount:19, image:'https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400&h=400&fit=crop' },
            { id:3, name:'هدفون بی‌سیم', category:'الکترونیک', group:'electronics', subcat:'هدفون', price:4200000, oldPrice:5100000, discount:18, image:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop' },
            { id:4, name:'عطر فرانسوی', category:'زیبایی', group:'beauty', subcat:'عطر', price:1850000, oldPrice:2200000, discount:16, image:'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400&h=400&fit=crop' },
            { id:5, name:'کتونی اسپرت', category:'مد و پوشاک', group:'fashion', subcat:'کفش', price:1650000, oldPrice:1900000, discount:13, image:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=400&fit=crop' },
            { id:6, name:'لپتاپ ۱۵ اینچ', category:'الکترونیک', group:'electronics', subcat:'لپتاپ', price:28500000, oldPrice:32000000, discount:11, image:'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400&h=400&fit=crop' },
        ];

        let currentFilter = 'all';

        function getCart() { return JSON.parse(localStorage.getItem('cart')||'[]'); }
        function setCart(c) { localStorage.setItem('cart',JSON.stringify(c)); updateCartUI(); }
        function getWishlist() { return JSON.parse(localStorage.getItem('wishlist')||'[]'); }
        function setWishlist(w) { localStorage.setItem('wishlist',JSON.stringify(w)); updateWishlistUI(); }

        function updateCartBadge() { document.getElementById('cartBadge').textContent = getCart().reduce((s,i)=>s+i.quantity,0); }
        function updateWishlistBadge() { document.getElementById('wishlistBadge').textContent = getWishlist().length; }

        function renderCartDropdown() {
            const cart = getCart();
            document.getElementById('cartItems').innerHTML = cart.length ? cart.map(i=>`
                <div class="dropdown-item">
                    <img src="${i.image}"><div style="flex:1"><div class="item-title">${i.name}</div><div class="item-price">${i.price.toLocaleString()} تومان</div></div>
                    <button class="remove-item" onclick="removeFromCart(${i.id})">✕</button>
                </div>`).join('') : '<p style="color:var(--text-muted);">سبد خرید خالی است</p>';
            const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
            document.getElementById('cartFooter').innerHTML = cart.length ? `<span class="total">جمع: ${total.toLocaleString()} تومان</span><a href="cart.html" class="btn btn-primary btn-sm">تکمیل خرید</a>` : '';
        }

        function renderWishlistDropdown() {
            const wish = getWishlist();
            document.getElementById('wishlistItems').innerHTML = wish.length ? wish.map(i=>`
                <div class="dropdown-item">
                    <img src="${i.image}"><div style="flex:1"><div class="item-title">${i.name}</div><div class="item-price">${i.price.toLocaleString()} تومان</div></div>
                    <button class="remove-item" onclick="removeFromWishlist(${i.id})">✕</button>
                </div>`).join('') : '<p style="color:var(--text-muted);">لیست علاقه‌مندی خالی است</p>';
        }

        function updateCartUI() { updateCartBadge(); renderCartDropdown(); }
        function updateWishlistUI() { updateWishlistBadge(); renderWishlistDropdown(); }

        function addToCart(id) {
            const cart = getCart(); const p = products.find(x=>x.id===id);
            const exist = cart.find(x=>x.id===id);
            if(exist) exist.quantity++; else cart.push({...p, quantity:1});
            setCart(cart); showToast('به سبد اضافه شد');
        }

        function removeFromCart(id) { setCart(getCart().filter(i=>i.id!==id)); }
        function removeFromWishlist(id) { setWishlist(getWishlist().filter(i=>i.id!==id)); }

        function toggleWishlist(id) {
            const w = getWishlist(); const idx = w.findIndex(x=>x.id===id);
            if(idx>-1) w.splice(idx,1); else w.push(products.find(x=>x.id===id));
            setWishlist(w); renderProducts();
        }

        function renderProducts() {
            const filtered = currentFilter === 'all' ? products : products.filter(p=>p.group===currentFilter);
            document.getElementById('flashProducts').innerHTML = filtered.map(p=>{
                const liked = getWishlist().some(w=>w.id===p.id);
                return `<article class="product-card">
                    <div class="product-img">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="product-badges"><span class="badge">${p.discount}%</span></div>
                        <button class="wishlist-btn-card ${liked?'liked':''}" onclick="event.stopPropagation();toggleWishlist(${p.id})">${liked?'❤️':'🤍'}</button>
                    </div>
                    <div class="product-info">
                        <span class="product-category">${p.category}</span>
                        <h3 class="product-name">${p.name}</h3>
                        <div><span class="price">${p.price.toLocaleString()} تومان</span>${p.oldPrice ? `<span class="old-price">${p.oldPrice.toLocaleString()}</span>` : ''}</div>
                        <button class="add-to-cart-btn" onclick="event.stopPropagation();addToCart(${p.id})">افزودن به سبد</button>
                    </div>
                </article>`;
            }).join('');
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.textContent=msg;
            t.style.cssText='background:var(--bg-card); color:var(--text-primary); padding:10px 16px; border-radius:8px; border-right:4px solid var(--accent); backdrop-filter:blur(8px);';
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(()=>t.remove(),2500);
        }

        document.getElementById('hamburgerBtn').addEventListener('click',()=>{
            document.getElementById('mobileMenu').classList.toggle('active');
            document.getElementById('mobileOverlay').classList.toggle('active');
            document.getElementById('hamburgerBtn').classList.toggle('active');
        });
        document.getElementById('mobileOverlay').addEventListener('click',()=>{
            document.getElementById('mobileMenu').classList.remove('active');
            document.getElementById('mobileOverlay').classList.remove('active');
            document.getElementById('hamburgerBtn').classList.remove('active');
        });

        document.getElementById('cartToggle').addEventListener('click',()=>{
            document.getElementById('cartDropdown').classList.toggle('active');
            document.getElementById('wishlistDropdown').classList.remove('active');
        });
        document.getElementById('wishlistToggle').addEventListener('click',()=>{
            document.getElementById('wishlistDropdown').classList.toggle('active');
            document.getElementById('cartDropdown').classList.remove('active');
        });

        document.getElementById('searchToggle').addEventListener('click',()=>document.getElementById('searchOverlay').classList.add('active'));
        document.getElementById('closeSearch').addEventListener('click',()=>document.getElementById('searchOverlay').classList.remove('active'));
        document.getElementById('searchInput').addEventListener('input',(e)=>{
            const q = e.target.value.toLowerCase();
            document.getElementById('searchResults').innerHTML = products.filter(p=>p.name.includes(q)).map(p=>`<div class="search-item" onclick="addToCart(${p.id})">${p.name}</div>`).join('');
        });

        document.querySelectorAll('.filter-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                renderProducts();
            });
        });

        document.getElementById('themeToggle').addEventListener('click',()=>{
            document.body.classList.toggle('light-mode');
            document.getElementById('themeToggle').textContent = document.body.classList.contains('light-mode')?'☀️':'🌙';
            localStorage.setItem('theme', document.body.classList.contains('light-mode')?'light':'dark');
        });
        if(localStorage.getItem('theme')==='light') {
            document.body.classList.add('light-mode');
            document.getElementById('themeToggle').textContent = '☀️';
        }

        function startCountdown() {
            const end = Date.now() + (2*3600+34*60+56)*1000;
            setInterval(()=>{
                const diff = end - Date.now();
                if(diff<=0) return;
                document.getElementById('cd-hours').textContent = String(Math.floor(diff/3600000)).padStart(2,'0');
                document.getElementById('cd-minutes').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
                document.getElementById('cd-seconds').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
            },1000);
        }

        window.applyMegaFilter = (cat) => {
            currentFilter = cat === 'all' ? 'all' : cat;
            document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            if(cat==='all') document.querySelector('.filter-btn[data-category="all"]').classList.add('active');
            renderProducts();
            document.getElementById('flash-sale').scrollIntoView({behavior:'smooth'});
        };

        renderProducts();
        updateCartUI();
        updateWishlistUI();
        startCountdown();
    </script>
</body>
</html>
