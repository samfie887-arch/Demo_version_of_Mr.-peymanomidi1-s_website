<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="ژینو - فروشگاه اینترنتی لوکس | طراحی مدرن و خاص">
    <meta name="theme-color" content="#1a0533">
    <title>ژینو | فروشگاه اینترنتی لوکس</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a0533;
            --bg-card: rgba(45, 27, 78, 0.9);
            --text: #f8f0ff;
            --text-secondary: #d1c4e9;
            --accent: #ff6f91;
            --accent2: #ffc75f;
            --accent3: #00c9a7;
            --border: rgba(255, 255, 255, 0.2);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 20px;
            --radius-clip: 20% 0 20% 0;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg: #fdf6ff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --text: #2d1b4e;
            --text-secondary: #4a3f5c;
            --accent: #e8456b;
            --accent2: #f5a623;
            --accent3: #008b74;
            --border: rgba(0, 0, 0, 0.15);
            --shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background 0.4s, color 0.4s;
            overflow-x: hidden;
            min-height: 100vh;
        }
        body.no-scroll { overflow: hidden; }

        /* ذرات پس‌زمینه */
        #particles-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }

        /* تایپوگرافی خاص */
        h1, h2, h3 { font-weight: 900; letter-spacing: -0.5px; }
        .section-title h2 {
            font-size: 2rem; background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: inline-block; position: relative;
        }
        .section-title h2::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 4px; background: var(--accent); border-radius: 4px;
        }

        /* دکمه‌ها با انیمیشن ripple */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 28px; border-radius: 50px; font-weight: 700; border: none;
            cursor: pointer; transition: all var(--transition); font-family: inherit;
            text-decoration: none; position: relative; overflow: hidden;
            color: #fff; background: var(--accent);
            box-shadow: 0 4px 15px rgba(255, 111, 145, 0.4);
        }
        .btn::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
            border-radius: 50%; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn:active::after { width: 300px; height: 300px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #1a0533; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); box-shadow: none; }
        .btn-sm { padding: 8px 18px; font-size: 0.85rem; }

        /* نوبار */
        .navbar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(26, 5, 51, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); height: 60px;
        }
        .navbar-inner { display: flex; align-items: center; justify-content: space-between; height: 100%; gap: 12px; }
        .navbar-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .brand-logo svg { width: 32px; height: 32px; }
        .brand-text {
            font-size: 1.5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .navbar-actions { display: flex; align-items: center; gap: 10px; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--border);
            background: transparent; color: var(--text); cursor: pointer;
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            position: relative; transition: all var(--transition);
        }
        .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
        .badge-count {
            position: absolute; top: -6px; right: -6px; background: var(--accent); color: #fff;
            font-size: 0.65rem; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
            border: 2px solid var(--bg);
        }
        .hamburger { display: flex; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; }
        .hamburger span { width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

        /* موبایل منو */
        .mobile-menu {
            position: fixed; top: 0; right: -100%; width: 80%; max-width: 320px; height: 100vh;
            background: rgba(26, 5, 51, 0.98); backdrop-filter: blur(24px); z-index: 1500;
            padding: 80px 24px 30px; transition: right 0.3s; border-left: 1px solid var(--border);
            overflow-y: auto;
        }
        .mobile-menu.active { right: 0; }
        .mobile-menu a {
            display: block; padding: 14px; border-radius: 12px; color: var(--text); text-decoration: none;
            margin-bottom: 6px; font-weight: 500; border: 1px solid transparent; transition: all 0.2s;
        }
        .mobile-menu a:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,111,145,0.1); }
        .mobile-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1400;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .mobile-overlay.active { opacity: 1; visibility: visible; }

        /* کارت محصول با زاویه‌های خاص */
        .products-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
        }
        .product-card {
            background: var(--bg-card); backdrop-filter: blur(12px);
            border-radius: var(--radius); overflow: hidden;
            border: 1px solid var(--border); box-shadow: var(--shadow);
            transition: all var(--transition); position: relative;
            clip-path: polygon(0 0, 100% 4%, 100% 100%, 0 96%);
        }
        .product-card:hover {
            transform: translateY(-6px); border-color: var(--accent);
            box-shadow: 0 16px 40px rgba(255, 111, 145, 0.3);
        }
        .product-img {
            aspect-ratio: 1/1; background: #2d1b4e; position: relative;
            overflow: hidden;
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-img img { transform: scale(1.1); }
        .product-badges { position: absolute; top: 10px; right: 10px; z-index: 2; }
        .badge {
            background: var(--accent); color: #fff; padding: 4px 10px;
            border-radius: 20px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px;
        }
        .wishlist-btn-card {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5);
            width: 30px; height: 30px; border-radius: 50%; border: none;
            color: #fff; font-size: 1rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2; transition: background 0.3s;
        }
        .wishlist-btn-card.liked { background: var(--accent); }
        .product-info { padding: 12px; display: flex; flex-direction: column; flex: 1; }
        .product-category { font-size: 0.7rem; color: var(--accent2); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
        .product-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; }
        .price { font-weight: 900; font-size: 1.1rem; color: var(--accent); }
        .old-price { font-size: 0.75rem; color: var(--text-secondary); text-decoration: line-through; margin-right: 6px; }
        .add-to-cart-btn {
            width: 100%; margin-top: auto; padding: 10px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #1a0533; border: none; font-weight: 700; font-family: inherit;
            cursor: pointer; font-size: 0.8rem; transition: box-shadow 0.3s;
        }
        .add-to-cart-btn:hover { box-shadow: 0 4px 15px rgba(255, 111, 145, 0.5); }

        /* تایمر */
        .countdown { display: flex; gap: 8px; justify-content: center; margin: 20px 0 30px; }
        .countdown-item {
            background: rgba(45, 27, 78, 0.8); padding: 10px 14px; border-radius: 12px;
            min-width: 55px; border: 1px solid var(--accent); text-align: center;
            backdrop-filter: blur(8px);
        }
        .countdown-number { font-size: 1.5rem; font-weight: 900; color: var(--accent2); }
        .countdown-label { font-size: 0.7rem; color: var(--text-secondary); }

        /* جستجو overlay */
        .search-overlay {
            position: fixed; inset: 0; background: rgba(26, 5, 51, 0.97); z-index: 1100;
            display: flex; align-items: flex-start; justify-content: center; padding-top: 80px;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .search-overlay.active { opacity: 1; visibility: visible; }
        .search-container { width: 90%; max-width: 500px; }
        .search-input-wrap { display: flex; gap: 8px; }
        .search-input-wrap input {
            flex: 1; padding: 12px 16px; border-radius: 30px; border: 2px solid var(--border);
            background: var(--bg-card); color: var(--text); font-size: 1rem; outline: none;
        }
        .search-results { margin-top: 16px; }

        /* کشوهای سبد و علاقه‌مندی */
        .dropdown-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-card); backdrop-filter: blur(24px);
            border-top: 2px solid var(--accent); border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.4); max-height: 70vh;
            overflow-y: auto; padding: 20px; transform: translateY(100%);
            transition: transform 0.3s ease; z-index: 1200;
        }
        .dropdown-panel.active { transform: translateY(0); }
        .dropdown-item { display: flex; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .dropdown-item img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }
        .item-title { font-size: 0.9rem; font-weight: 600; }
        .item-price { font-size: 0.85rem; color: var(--accent); font-weight: 700; }
        .remove-item { background: none; border: none; color: var(--accent); font-size: 1.2rem; cursor: pointer; }

        /* فوتر */
        .footer {
            background: var(--bg-card); backdrop-filter: blur(12px);
            border-top: 1px solid var(--border); padding: 40px 0 24px; margin-top: 60px;
            text-align: center;
        }
        .footer-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .footer-col h4 { color: var(--accent); margin-bottom: 8px; }

        @media (min-width: 768px) {
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
            .navbar-brand { font-size: 1.8rem; }
            .dropdown-panel {
                position: absolute; bottom: auto; top: 60px; left: 0; right: auto;
                width: 340px; border-radius: 16px; border: 1px solid var(--border);
                transform: translateY(-10px); box-shadow: var(--shadow);
            }
            .footer-grid { flex-direction: row; justify-content: space-around; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <header class="navbar">
        <div class="container navbar-inner">
            <a href="index.html" class="navbar-brand">
                <span class="brand-logo">
                    <svg viewBox="0 0 40 40" fill="none"><path d="M20 4L36 12V28L20 36L4 28V12L20 4Z" stroke="url(#g)" stroke-width="2"/><circle cx="20" cy="20" r="6" fill="url(#g)"/><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6f91"/><stop offset="100%" stop-color="#ffc75f"/></linearGradient></defs></svg>
                </span>
                <span class="brand-text">ژینو</span>
            </a>
            <div class="navbar-actions">
                <button class="icon-btn" id="searchToggle">🔍</button>
                <button class="icon-btn" id="wishlistToggle">♡<span class="badge-count" id="wishlistBadge">0</span></button>
                <button class="icon-btn" id="cartToggle">🛒<span class="badge-count" id="cartBadge">0</span></button>
                <button class="icon-btn" id="themeToggle">🌙</button>
                <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
            </div>
        </div>
    </header>

    <div class="mobile-overlay" id="mobileOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">🏠 خانه</a>
        <a href="products.html">🛍️ محصولات</a>
        <a href="#" onclick="applyFilter('all')">🗂️ همه</a>
        <a href="#" onclick="applyFilter('ساعت')">⌚ ساعت</a>
        <a href="#" onclick="applyFilter('کفش')">👟 کفش</a>
        <a href="about.html">ℹ️ درباره ما</a>
    </div>

    <div class="dropdown-panel" id="cartDropdown">
        <h3 style="color:var(--accent);">🛒 سبد خرید</h3>
        <div id="cartItems"></div>
        <div id="cartFooter" style="margin-top:16px; display:flex; justify-content:space-between;"></div>
    </div>
    <div class="dropdown-panel" id="wishlistDropdown">
        <h3 style="color:var(--accent);">❤️ علاقه‌مندی‌ها</h3>
        <div id="wishlistItems"></div>
    </div>
    <div class="search-overlay" id="searchOverlay">
        <div class="search-container">
            <div class="search-input-wrap">
                <input type="text" id="searchInput" placeholder="جستجو...">
                <button class="btn btn-outline btn-sm" id="closeSearch">بستن</button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <main style="position:relative; z-index:1;">
        <section style="padding: 60px 0 40px; text-align: center;">
            <div class="container">
                <h1 style="font-size: clamp(2.5rem, 8vw, 4rem); line-height:1.2; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">خریدی فراتر از تصور</h1>
                <p style="color: var(--text-secondary); margin: 16px 0 8px; font-size: 1.1rem;">تا ۵۰٪ تخفیف، فقط تا پایان امشب</p>
                <div class="countdown" id="countdown">
                    <div class="countdown-item"><div class="countdown-number" id="cd-seconds">56</div><div class="countdown-label">ثانیه</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="cd-minutes">34</div><div class="countdown-label">دقیقه</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="cd-hours">02</div><div class="countdown-label">ساعت</div></div>
                </div>
                <a href="#products" class="btn btn-primary btn-lg" style="font-size:1.1rem;">کشف محصولات</a>
            </div>
        </section>

        <div class="container" style="padding: 24px 0;">
            <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;" id="categoryFilter">
                <button class="btn btn-outline btn-sm active" data-category="all">همه</button>
                <button class="btn btn-outline btn-sm" data-category="fashion">مد و پوشاک</button>
                <button class="btn btn-outline btn-sm" data-category="electronics">الکترونیک</button>
                <button class="btn btn-outline btn-sm" data-category="beauty">زیبایی</button>
            </div>
        </div>

        <section class="section-padding" id="products" style="padding-top: 8px;">
            <div class="container">
                <div class="section-title"><h2>⚡ فروش ویژه</h2></div>
                <div class="products-grid" id="flashProducts"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col"><h4>ژینو</h4><p>لوکس و متفاوت</p></div>
                <div class="footer-col"><h4>خدمات</h4><p>پیگیری | بازگشت</p></div>
                <div class="footer-col"><h4>ارتباط</h4><p>درباره ما | تماس</p></div>
            </div>
            <div style="color:var(--text-secondary); font-size:0.8rem;">© ۱۴۰۴ ژینو</div>
        </div>
    </footer>

    <script>
        (function() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];
            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize); resize();
            for(let i=0; i<40; i++) particles.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2+1, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5, o:Math.random()*0.5+0.3});
            function draw() {
                ctx.clearRect(0,0,w,h);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0||p.x>w) p.vx*=-1;
                    if(p.y<0||p.y>h) p.vy*=-1;
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                    ctx.fillStyle = `rgba(255,111,145,${p.o})`; ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        const products = [
            { id:1, name:'ساعت مچی لوکس', category:'مد و پوشاک', group:'fashion', subcat:'ساعت', price:2850000, oldPrice:3400000, discount:16, image:'https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=400&h=400&fit=crop' },
            { id:2, name:'کیف چرم طبیعی', category:'مد و پوشاک', group:'fashion', subcat:'کیف', price:1950000, oldPrice:2400000, discount:19, image:'https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400&h=400&fit=crop' },
            { id:3, name:'هدفون بی‌سیم', category:'الکترونیک', group:'electronics', subcat:'هدفون', price:4200000, oldPrice:5100000, discount:18, image:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop' },
            { id:4, name:'عطر فرانسوی', category:'زیبایی', group:'beauty', subcat:'عطر', price:1850000, oldPrice:2200000, discount:16, image:'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400&h=400&fit=crop' },
            { id:5, name:'کتونی اسپرت', category:'مد و پوشاک', group:'fashion', subcat:'کفش', price:1650000, oldPrice:1900000, discount:13, image:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=400&fit=crop' },
            { id:6, name:'لپتاپ ۱۵ اینچ', category:'الکترونیک', group:'electronics', subcat:'لپتاپ', price:28500000, oldPrice:32000000, discount:11, image:'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400&h=400&fit=crop' },
        ];

        let currentFilter = 'all';

        function getCart() { return JSON.parse(localStorage.getItem('cart')||'[]'); }
        function setCart(c) { localStorage.setItem('cart',JSON.stringify(c)); updateCartUI(); }
        function getWishlist() { return JSON.parse(localStorage.getItem('wishlist')||'[]'); }
        function setWishlist(w) { localStorage.setItem('wishlist',JSON.stringify(w)); updateWishlistUI(); }

        function updateCartBadge() { document.getElementById('cartBadge').textContent = getCart().reduce((s,i)=>s+i.quantity,0); }
        function updateWishlistBadge() { document.getElementById('wishlistBadge').textContent = getWishlist().length; }

        function renderCartDropdown() {
            const cart = getCart();
            document.getElementById('cartItems').innerHTML = cart.length ? cart.map(i=>`
                <div class="dropdown-item"><img src="${i.image}"><div style="flex:1"><div class="item-title">${i.name}</div><div class="item-price">${i.price.toLocaleString()} تومان</div></div><button class="remove-item" onclick="removeFromCart(${i.id})">✕</button></div>`).join('') : '<p style="color:var(--text-secondary);">خالی</p>';
            const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
            document.getElementById('cartFooter').innerHTML = cart.length ? `<span>جمع: ${total.toLocaleString()} تومان</span><a href="cart.html" class="btn btn-primary btn-sm">تکمیل</a>` : '';
        }

        function renderWishlistDropdown() {
            const wish = getWishlist();
            document.getElementById('wishlistItems').innerHTML = wish.length ? wish.map(i=>`
                <div class="dropdown-item"><img src="${i.image}"><div style="flex:1"><div class="item-title">${i.name}</div><div class="item-price">${i.price.toLocaleString()} تومان</div></div><button class="remove-item" onclick="removeFromWishlist(${i.id})">✕</button></div>`).join('') : '<p style="color:var(--text-secondary);">خالی</p>';
        }

        function updateCartUI() { updateCartBadge(); renderCartDropdown(); }
        function updateWishlistUI() { updateWishlistBadge(); renderWishlistDropdown(); }

        function addToCart(id) {
            const cart = getCart(); const p = products.find(x=>x.id===id);
            const exist = cart.find(x=>x.id===id);
            if(exist) exist.quantity++; else cart.push({...p, quantity:1});
            setCart(cart); showToast('به سبد اضافه شد');
        }

        function removeFromCart(id) { setCart(getCart().filter(i=>i.id!==id)); }
        function removeFromWishlist(id) { setWishlist(getWishlist().filter(i=>i.id!==id)); }

        function toggleWishlist(id) {
            const w = getWishlist(); const idx = w.findIndex(x=>x.id===id);
            if(idx>-1) w.splice(idx,1); else w.push(products.find(x=>x.id===id));
            setWishlist(w); renderProducts();
        }

        function renderProducts() {
            const filtered = currentFilter === 'all' ? products : products.filter(p=>p.group===currentFilter);
            document.getElementById('flashProducts').innerHTML = filtered.map(p=>{
                const liked = getWishlist().some(w=>w.id===p.id);
                return `<article class="product-card">
                    <div class="product-img"><img src="${p.image}" alt="${p.name}"><div class="product-badges"><span class="badge">-${p.discount}%</span></div><button class="wishlist-btn-card ${liked?'liked':''}" onclick="event.stopPropagation();toggleWishlist(${p.id})">${liked?'❤️':'🤍'}</button></div>
                    <div class="product-info"><span class="product-category">${p.category}</span><h3 class="product-name">${p.name}</h3><div><span class="price">${p.price.toLocaleString()} تومان</span>${p.oldPrice?`<span class="old-price">${p.oldPrice.toLocaleString()}</span>`:''}</div><button class="add-to-cart-btn" onclick="event.stopPropagation();addToCart(${p.id})">افزودن به سبد</button></div>
                </article>`;
            }).join('');
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.textContent=msg;
            t.style.cssText='position:fixed; bottom:80px; left:20px; background:var(--accent); color:#fff; padding:10px 20px; border-radius:30px; z-index:9999; font-weight:700;';
            document.body.appendChild(t);
            setTimeout(()=>t.remove(),2500);
        }

        document.getElementById('hamburgerBtn').addEventListener('click',()=>{
            document.getElementById('mobileMenu').classList.toggle('active');
            document.getElementById('mobileOverlay').classList.toggle('active');
            document.getElementById('hamburgerBtn').classList.toggle('active');
        });
        document.getElementById('mobileOverlay').addEventListener('click',()=>{
            document.getElementById('mobileMenu').classList.remove('active');
            document.getElementById('mobileOverlay').classList.remove('active');
            document.getElementById('hamburgerBtn').classList.remove('active');
        });

        document.getElementById('cartToggle').addEventListener('click',()=>{
            document.getElementById('cartDropdown').classList.toggle('active');
            document.getElementById('wishlistDropdown').classList.remove('active');
        });
        document.getElementById('wishlistToggle').addEventListener('click',()=>{
            document.getElementById('wishlistDropdown').classList.toggle('active');
            document.getElementById('cartDropdown').classList.remove('active');
        });

        document.getElementById('searchToggle').addEventListener('click',()=>document.getElementById('searchOverlay').classList.add('active'));
        document.getElementById('closeSearch').addEventListener('click',()=>document.getElementById('searchOverlay').classList.remove('active'));
        document.getElementById('searchInput').addEventListener('input',(e)=>{
            const q = e.target.value.toLowerCase();
            document.getElementById('searchResults').innerHTML = products.filter(p=>p.name.includes(q)).map(p=>`<div style="padding:8px;cursor:pointer; color:var(--text);" onclick="addToCart(${p.id})">${p.name}</div>`).join('');
        });

        document.querySelectorAll('#categoryFilter .btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                document.querySelectorAll('#categoryFilter .btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                renderProducts();
            });
        });

        document.getElementById('themeToggle').addEventListener('click',()=>{
            document.body.classList.toggle('light-mode');
            document.getElementById('themeToggle').textContent = document.body.classList.contains('light-mode')?'☀️':'🌙';
            localStorage.setItem('theme', document.body.classList.contains('light-mode')?'light':'dark');
        });
        if(localStorage.getItem('theme')==='light') {
            document.body.classList.add('light-mode');
            document.getElementById('themeToggle').textContent = '☀️';
        }

        function startCountdown() {
            const end = Date.now() + (2*3600+34*60+56)*1000;
            setInterval(()=>{
                const diff = end - Date.now();
                if(diff<=0) return;
                document.getElementById('cd-hours').textContent = String(Math.floor(diff/3600000)).padStart(2,'0');
                document.getElementById('cd-minutes').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
                document.getElementById('cd-seconds').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
            },1000);
        }

        window.applyFilter = (cat) => {
            currentFilter = cat === 'all' ? 'all' : cat;
            document.querySelectorAll('#categoryFilter .btn').forEach(b=>b.classList.remove('active'));
            if(cat==='all') document.querySelector('#categoryFilter .btn[data-category="all"]').classList.add('active');
            renderProducts();
            document.getElementById('products').scrollIntoView({behavior:'smooth'});
        };

        renderProducts();
        updateCartUI();
        updateWishlistUI();
        startCountdown();
    </script>
</body>
</html>
